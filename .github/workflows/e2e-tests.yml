name: E2E Tests via Tailscale

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests on Ubuntu via Tailscale
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔗 Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UBUNTU_SSH_PRIVATE_KEY }}

      - name: 📋 Add Ubuntu to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.UBUNTU_TAILSCALE_IP }} >> ~/.ssh/known_hosts

      - name: 🚀 Run tests on Ubuntu via Tailscale
        run: |
          ssh ${{ secrets.UBUNTU_USER }}@${{ secrets.UBUNTU_TAILSCALE_IP }} << 'EOF'
            set -e
            
            echo "📂 Navigate to project"
            cd ~/projects/react_crm
            
            echo "🔄 Pull latest code"
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            git pull origin master
            
            echo "📝 Create test-data.json from secrets"
            cat > ~/projects/react_crm/e2e/test-data.json << TESTDATA
            {
              "admin": {
                "email": "${{ secrets.TEST_ADMIN_EMAIL }}",
                "password": "${{ secrets.TEST_ADMIN_PASSWORD }}"
              },
              "instructor": {
                "email": "${{ secrets.TEST_INSTRUCTOR_EMAIL }}",
                "password": "${{ secrets.TEST_INSTRUCTOR_PASSWORD }}"
              },
              "recoveryEmail": "${{ secrets.TEST_RECOVERY_EMAIL }}"
            }
            TESTDATA
            
            echo "🐳 Restart Docker container with fresh code"
            docker compose down
            docker compose up -d
            
            echo "📦 Update dependencies in container"
            docker compose exec -T playwright-runner npm ci
            
            echo "🗑️  Clean old reports (Docker + host)"
            docker compose exec -T playwright-runner rm -rf /app/e2e/html-report /app/e2e/test-results
            sudo rm -rf ~/projects/react_crm/e2e/html-report ~/projects/react_crm/e2e/test-results
            
            echo "🧪 Run Playwright tests"
            docker compose exec -T playwright-runner npm run test:e2e
            
            echo "✅ Reports created, verifying..."
            ls -la ~/projects/react_crm/e2e/html-report/ || echo "⚠️  No HTML report"
            ls -la ~/projects/react_crm/e2e/test-results/ || echo "⚠️  No test results"
            
            EXIT_CODE=$?
            echo "Tests finished with exit code: $EXIT_CODE"
            exit $EXIT_CODE
          EOF

      - name: 📊 Download test results via Tailscale
        if: always()
        run: |
          echo "📥 Copying reports from Ubuntu..."
          scp -r ${{ secrets.UBUNTU_USER }}@${{ secrets.UBUNTU_TAILSCALE_IP }}:~/projects/react_crm/e2e/html-report ./playwright-report || echo "❌ No HTML report found"
          scp -r ${{ secrets.UBUNTU_USER }}@${{ secrets.UBUNTU_TAILSCALE_IP }}:~/projects/react_crm/e2e/test-results ./test-results || echo "❌ No test results found"
          
          echo "🔍 What was copied:"
          ls -la ./playwright-report/ 2>/dev/null || echo "playwright-report/ missing"
          ls -la ./test-results/ 2>/dev/null || echo "test-results/ missing"

      - name: 📤 Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: ✅ Tests passed
        if: success()
        run: echo "🎉 All E2E tests passed via Tailscale!"

      - name: ❌ Tests failed
        if: failure()
        run: |
          echo "❌ E2E tests failed. Check artifacts."
          exit 1